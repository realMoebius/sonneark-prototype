<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>SonneARK</title>
    <script>
      // SPA redirect for GitHub Pages — encodes the path into a query string
      // so index.html can recover it via history.replaceState before React Router boots.
      // pathSegmentsToKeep=1 preserves the repo-name segment (sonneark-prototype).
      var l = window.location;
      var segments = 1;
      l.replace(
        l.protocol + '//' + l.host + '/' +
        l.pathname.split('/').slice(0, 1 + segments).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segments).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
