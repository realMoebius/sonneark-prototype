      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) { return s.replace(/~and~/g, '&'); });

            null, null,
            decoded[0] + (decoded.slice(1).join('&') ? '?' + decoded.slice(1).join('&') : '') + l.hash
          );
        }
      }(window.location));
